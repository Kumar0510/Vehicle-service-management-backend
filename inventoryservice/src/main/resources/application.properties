spring.application.name=inventoryservice

server.port=8081


# database
spring.datasource.url=jdbc:mysql://localhost:3306/testdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root


spring.jpa.hibernate.ddl-auto=update


spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

logging.level.org.springframework.web.servlet.mvc.method.annotation.ExceptionHandlerExceptionResolver=ERROR

# EUREKA CLIENT SETTINGS
# 1. Enable registration with the Eureka Server
eureka.client.register-with-eureka=true

# 2. Tell this service to fetch the registry (so it can find other services)
eureka.client.fetch-registry=true

# 3. The URL of the Eureka Server (the "brain" on port 8761)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# 4. Use the service name instead of IP address for better stability
eureka.instance.prefer-ip-address=true